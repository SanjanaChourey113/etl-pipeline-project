name: ETL Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: Powershell
        run: |
          pip uninstall -y dbt-core dbt-postgres pydantic
          pip install -r requirements.txt

      - name: Create DBT profiles.yml
        shell: powershell
        run: |
          if (!(Test-Path "$env:USERPROFILE\.dbt")) {
              New-Item -ItemType Directory -Path "$env:USERPROFILE\.dbt" -Force
          }
          python -c "
import os
content = '''my_project:
  target: dev
  outputs:
    dev:
      type: postgres
      host: {db_host}
      user: {db_user}
      password: {db_password}
      port: {db_port}
      dbname: {db_name}
      schema: public
'''.format(
    db_host=os.environ['DB_HOST'],
    db_user=os.environ['DB_USER'],
    db_password=os.environ['DB_PASSWORD'],
    db_port=os.environ['DB_PORT'],
    db_name=os.environ['DB_NAME']
)
with open(os.path.join(os.environ['USERPROFILE'], '.dbt', 'profiles.yml'), 'w', encoding='utf-8') as f:
    f.write(content)
"
        env:
          DB_HOST: ${{ secrets.host }}
          DB_USER: ${{ secrets.user }}
          DB_PASSWORD: ${{ secrets.password }}
          DB_PORT: ${{ secrets.port }}
          DB_NAME: ${{ secrets.dbname }}

      - name: Run DBT
        shell: powershell
        run: |
          cd my_project
          dbt run

      - name: Run Pytest
        shell: powershell
        run: |
          pytest
