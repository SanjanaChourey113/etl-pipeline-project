name: ETL Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ✅ ADD THIS STEP (VERY IMPORTANT 🔐)
      - name: Create DBT profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "
          my_project:
            target: dev
            outputs:
              dev:
                type: postgres
                host: $DB_HOST
                user: $DB_USER
                password: $DB_PASSWORD
                port: $DB_PORT
                dbname: $DB_NAME
                schema: public
          " > ~/.dbt/profiles.yml
        env:
          DB_HOST: ${{ secrets.host }}
          DB_USER: ${{ secrets.user }}
          DB_PASSWORD: ${{ secrets.password }}
          DB_PORT: ${{ secrets.port }}
          DB_NAME: ${{ secrets.dbname }}

      - name: Run DBT
        run: |
          dbt run

      - name: Run Pytest
        run: |
          pytest