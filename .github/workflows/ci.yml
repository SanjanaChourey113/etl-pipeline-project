name: ETL Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # ADD THIS (PostgreSQL container)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # FIXED DBT PROFILE (no secrets, direct connection)
      - name: Create DBT profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "
          my_project:
            target: dev
            outputs:
              dev:
                type: postgres
                host: postgres
                user: postgres
                password: postgres
                port: 5432
                dbname: etl_pipeline
                schema: public
          " > ~/.dbt/profiles.yml

      - name: Run DBT
        run: |
          cd my_project
          dbt run

      - name: Run Pytest
        run: |
          pytest